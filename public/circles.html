<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helper Daemon Console</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { margin:0; padding:16px; background:#0b0e12; color:#e6edf3; font-family: ui-sans-serif, system-ui, sans-serif; }
    .wrap { max-width: 760px; margin: 0 auto; }
    button, input { width:100%; background:#111827; color:#e6edf3; border:1px solid #374151; border-radius:12px; padding:12px; margin-top:10px; }
    pre { background:#0d1117; border:1px solid #1f2937; border-radius:12px; padding:12px; overflow:auto; max-height:40vh; }
    .muted { color:#94a3b8; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2 style="margin-top:0;">Helper Daemon Console</h2>
    <div class="muted">This page signs in as a daemon. It can read world state, create objects, remove them, and react to trigger broadcasts.</div>

    <label class="muted" for="centerX">Center X</label>
    <input id="centerX" type="number" value="0" step="1" />

    <label class="muted" for="centerZ">Center Z</label>
    <input id="centerZ" type="number" value="0" step="1" />

    <label class="muted" for="count">Count</label>
    <input id="count" type="number" value="12" min="1" max="120" />

    <label class="muted" for="radius">Radius</label>
    <input id="radius" type="number" value="20" min="1" max="200" />

    <button id="spawn">Spawn Trigger Ring</button>
    <button id="snapshot">Refresh World Snapshot</button>
    <button id="clear" style="background:#2a0f14;">Clear My Objects</button>

    <h3>Status</h3>
    <div id="status" class="muted">Connecting…</div>

    <h3>Recent Trigger</h3>
    <pre id="triggers">none</pre>

    <h3>World Snapshot</h3>
    <pre id="state">{}</pre>
  </div>

  <script>
    const socket = io({
      transports: ['websocket', 'polling'],
      auth: { role: 'daemon', daemonType: 'circles', label: 'helper-daemon-circles' }
    });

    const status = document.getElementById('status');
    const triggersEl = document.getElementById('triggers');
    const stateEl = document.getElementById('state');
    let latestState = null;

    socket.on('connect', () => status.textContent = 'Connected as helper daemon');
    socket.on('worldState', (state) => {
      latestState = state;
      stateEl.textContent = JSON.stringify(state, null, 2);
    });

    socket.on('triggerEvent', (event) => {
      triggersEl.textContent = JSON.stringify(event, null, 2);
      if (event?.triggerId === 'beacon.ping' && event?.object?.position) {
        socket.emit('createObject', {
          kind: 'sphere',
          color: '#34D399',
          position: {
            x: event.object.position.x,
            y: event.object.position.y + 2,
            z: event.object.position.z
          },
          scale: { x: 0.8, y: 0.8, z: 0.8 },
          label: 'Daemon Echo',
          billboard: false,
          props: { spawnedBy: 'triggerEvent', triggerId: event.triggerId }
        });
      }
    });

    document.getElementById('snapshot').addEventListener('click', () => {
      socket.emit('requestWorldState', null, (state) => {
        latestState = state;
        stateEl.textContent = JSON.stringify(state, null, 2);
      });
    });

    document.getElementById('spawn').addEventListener('click', () => {
      const cx = Number(document.getElementById('centerX').value || 0);
      const cz = Number(document.getElementById('centerZ').value || 0);
      const count = Math.max(1, Math.min(120, Number(document.getElementById('count').value || 12)));
      const radius = Math.max(1, Math.min(200, Number(document.getElementById('radius').value || 20)));

      for (let i = 0; i < count; i++) {
        const a = (Math.PI * 2 * i) / count;
        socket.emit('createObject', {
          kind: 'sphere',
          color: '#F59E0B',
          position: { x: cx + Math.cos(a) * radius, y: 1, z: cz + Math.sin(a) * radius },
          scale: { x: 1.2, y: 1.2, z: 1.2 },
          label: `Ring Node ${i + 1}`,
          trigger: { id: 'ring.node.touch', mode: 'tap' },
          props: { daemonType: 'circles', nodeIndex: i }
        });
      }
    });

    document.getElementById('clear').addEventListener('click', () => {
      const objects = latestState?.worldObjects || {};
      for (const obj of Object.values(objects)) {
        if (obj.ownerId === socket.id) {
          socket.emit('destroyObject', { objectId: obj.id });
        }
      }
    });
  </script>
</body>
</html>
