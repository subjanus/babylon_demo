<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Game Debug</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { margin:0; padding:14px; background:#0b0e12; color:#e6edf3; font-family: ui-sans-serif, system-ui, sans-serif; }
    button { background:#111827; color:#e6edf3; border:1px solid #374151; border-radius:10px; padding:8px 10px; margin-right:8px; }
    pre { background:#0d1117; border:1px solid #1f2937; border-radius:12px; padding:10px; overflow:auto; max-height: 48vh; }
    .muted { color:#94a3b8; font-size: 12px; }
  </style>
</head>
<body>
  <h2 style="margin-top:0;">GPS Game Debug</h2>
  <div class="muted">Privacy refactor build. Players publish normalized meters only. Helper daemons can create and react to world objects.</div>
  <p>
    <button id="refresh">Refresh Telemetry</button>
    <button id="stateBtn">Refresh State</button>
  </p>
  <div class="muted" id="status">Connecting…</div>
  <h3>worldState</h3>
  <pre id="state">{}</pre>
  <h3>telemetry</h3>
  <pre id="telem">[]</pre>

  <script>
    const socket = io({ transports: ['websocket', 'polling'], auth: { role: 'daemon', daemonType: 'debug', label: 'debug-console' } });
    const statusEl = document.getElementById('status');
    const stateEl = document.getElementById('state');
    const telemEl = document.getElementById('telem');

    socket.on('connect', () => statusEl.textContent = 'Connected');
    socket.on('worldState', (state) => stateEl.textContent = JSON.stringify(state, null, 2));

    async function refreshTelemetry() {
      const r = await fetch('/debug/telemetry');
      telemEl.textContent = JSON.stringify(await r.json(), null, 2);
    }

    async function refreshState() {
      const r = await fetch('/debug/state');
      stateEl.textContent = JSON.stringify(await r.json(), null, 2);
    }

    document.getElementById('refresh').addEventListener('click', refreshTelemetry);
    document.getElementById('stateBtn').addEventListener('click', refreshState);
    refreshTelemetry();
    refreshState();
  </script>
</body>
</html>
