<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babylon Gyro GPS MMO · Privacy Mode</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      html, body { margin:0; padding:0; height:100%; display:flex; flex-direction:column; background:#0b0e12; color:#e6edf3; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      #renderCanvas { flex: 1 1 auto; width:100%; touch-action:none; display:block; }
      #hud { display:none; }
      #status { font-size:12px; line-height:1.3; opacity:.9; }
      a { color:#93c5fd; }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="hud"><div id="status">Connecting…</div></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
